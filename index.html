<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dfoellmi.ch</title>
  <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="75" font-size="80">⚡</text></svg>'>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      background:
        radial-gradient(circle at top left, #00d4ff 0, transparent 35%),
        radial-gradient(circle at bottom right, #ff007a 0, transparent 35%),
        #080b12;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }

    main {
      padding: 40px;
      max-width: 800px;
    }

    h1 {
      font-size: clamp(44px, 8vw, 96px);
      margin: 0 0 16px;
      letter-spacing: 2px;
    }

    p {
      font-size: clamp(18px, 3vw, 28px);
      color: #d7e1ff;
      margin-bottom: 32px;
    }

    button {
      border: 0;
      padding: 16px 28px;
      border-radius: 999px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      color: #080b12;
      background: white;
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.35);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: scale(1.08);
      box-shadow: 0 0 45px rgba(0, 212, 255, 0.7);
    }

    .kontakt-button {
      display: inline-block;
      margin-left: 12px;
      padding: 16px 28px;
      border-radius: 999px;
      font-size: 18px;
      font-weight: bold;
      color: white;
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.08);
      transition: transform 0.2s, background 0.2s;
    }

    .kontakt-button:hover {
      transform: scale(1.08);
      background: rgba(255, 255, 255, 0.18);
    }
    .badge {
      display: inline-block;
      margin-bottom: 22px;
      padding: 8px 14px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 999px;
      color: #b9c7ff;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
    }

    .pulse {
      animation: pulse 1.8s infinite;
    }

    .pace-rechner {
      margin-top: 36px;
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.08);
    }

    .pace-rechner h2 {
      margin-top: 0;
      margin-bottom: 18px;
    }

    .pace-rechner label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      color: #d7e1ff;
    }

    .pace-rechner select,
    .pace-rechner input {
      padding: 10px 12px;
      border: 0;
      border-radius: 10px;
      font-size: 16px;
    }

    .zeit-eingabe {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
    }

    #pace-ergebnis {
      margin-top: 18px;
      margin-bottom: 0;
      font-size: 20px;
    }
    
    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.04);
      }
    }
  </style>
</head>

<body>
  <main>
    <div class="badge">dfoellmi.ch</div>
    <h1>Wir gehen rein</h1>
    <p id="text">Drück mal, trust me ;)</p>
    <button onclick="aendereText()">Launch</button>
    <a class="kontakt-button" href="https://www.instagram.com/doemefoellmi/" target="_blank">
      Kontakt
    </a>
    <section class="pace-rechner">
  <h2>Pace Rechner</h2>

  <label for="distanz">Distanz</label>
  <select id="distanz">
    <option value="5">5 km</option>
    <option value="10">10 km</option>
    <option value="21.0975">Halbmarathon</option>
    <option value="42.195">Marathon</option>
  </select>

  <label for="stunden">Zielzeit</label>
  <div class="zeit-eingabe">
    <input id="stunden" type="number" value="2" min="0">
    <span>h</span>
    <input id="minuten" type="number" value="0" min="0" max="59">
    <span>min</span>
  </div>

  <button onclick="berechnePace()">Pace berechnen</button>

  <p id="pace-ergebnis">Wähle Distanz und Zeit.</p>
</section>
  </main>

  <script>
    const geheimeTexte = [
      "Gib mir noch zwei Wochen",
      "Okay okay, wir kochen",
      "Noch geheim, aber bald live",
      "Du bist zu früh dran ;)"
    ];

    let aktuellerText = 0;

    function aendereText() {
      const text = document.getElementById("text");

      text.textContent = geheimeTexte[aktuellerText];
      text.classList.add("pulse");

      aktuellerText = aktuellerText + 1;

      if (aktuellerText === geheimeTexte.length) {
        aktuellerText = 0;
      }
    }
    function berechnePace() {
      const distanz = Number(document.getElementById("distanz").value);
      const stunden = Number(document.getElementById("stunden").value);
      const minuten = Number(document.getElementById("minuten").value);
      const ergebnis = document.getElementById("pace-ergebnis");

      const gesamtMinuten = stunden * 60 + minuten;
      const pace = gesamtMinuten / distanz;

      const paceMinuten = Math.floor(pace);
      const paceSekunden = Math.round((pace - paceMinuten) * 60);

      ergebnis.textContent =
        `Du musst ca. ${paceMinuten}:${String(paceSekunden).padStart(2, "0")} min/km laufen.`;
}
  </script>
</body>
</html>
