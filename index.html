<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Meine erste Webseite</title>
</head>
<body>
  <h1>Hallo GitHub!</h1>
  <p id="text">Das ist meine erste eigene Webseite.</p>

  <button onclick="aendereText()">Klick mich</button>

  <script>
    function aendereText() {
      document.getElementById("text").textContent =
        "Du hast den Button geklickt!";
    }
  </script>
</body>
</html>
